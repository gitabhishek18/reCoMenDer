<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Ratings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="initRatingsPage()">
  <div id="navbarRoot"></div>

  <div class="container">
    <div class="page-header">
      <h1>My Ratings</h1>
      <p>Your latest ratings, newest first. This is where your taste leaves footprints.</p>
    </div>

    <div class="card">
      <div class="card-actions">
        <button class="soft-btn" onclick="loadRatings()">Refresh ratings</button>
        <a class="primary-btn" href="search.html">Rate more movies</a>
      </div>
    </div>

    <div class="card">
      <div id="ratingsContainer">Loading ratings...</div>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="ratings.js"></script>
</body>
</html>
