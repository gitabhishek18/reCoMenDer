<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { visibility: hidden; }
    .password-row { display: flex; gap: 10px; align-items: center; }
    .password-row input { margin-bottom: 14px; }
    .password-row button { margin-bottom: 14px; }
  </style>
</head>
<body onload="redirectIfAlreadyLoggedIn()">
  <div class="auth-box">
    <div class="kicker">Welcome back</div>
    <h2>Login</h2>
    <p class="auth-subtitle">Step into your rating history and personalized recommendation space.</p>

    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" placeholder="Enter email" autocomplete="off" />

    <label for="loginPassword">Password</label>
    <div class="password-row">
      <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="new-password" />
      <button type="button" class="soft-btn" id="loginPasswordToggle" onclick="togglePassword('loginPassword','loginPasswordToggle')">Show</button>
    </div>

    <button class="primary-btn" style="width:100%;" onclick="login()">Login</button>

    <div id="loginMessage"></div>

    <p class="center-text">
      Don’t have an account? <a href="register.html">Register here</a>
    </p>
  </div>

  <script src="common.js"></script>
  <script src="auth.js"></script>
</body>
</html>
